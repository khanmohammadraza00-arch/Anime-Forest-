<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Hub Pro</title>

<meta name="description" content="Best Anime Website - Action, Romance, Comedy anime with reviews and recommendations">

<style>
body { margin:0; font-family: Arial; background:#0d0d0d; color:white; }
header { background:#1a1a1a; padding:15px; text-align:center; }
input, select { padding:8px; margin:5px; border-radius:5px; border:none; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.card {
background:#1f1f1f;
margin:10px;
padding:15px;
border-radius:10px;
width:200px;
transition:0.3s;
}
.card:hover { transform:scale(1.05); }
button {
background:#ff4757;
border:none;
padding:8px;
color:white;
border-radius:5px;
cursor:pointer;
}
#ad-top,#ad-mid,#ad-bottom {
background:#333;
padding:15px;
margin:10px;
text-align:center;
}
#detailPage { display:none; padding:20px; }
</style>
</head>

<body>

<header>
<h1>🔥 Anime Hub Pro</h1>

<input type="text" id="search" placeholder="Search Anime..." onkeyup="filterAnime()">

<select id="category" onchange="filterAnime()">
<option value="">All Category</option>
<option>Action</option>
<option>Comedy</option>
<option>Romance</option>
<option>Fantasy</option>
<option>Sci-Fi</option>
</select>

<select id="language" onchange="filterAnime()">
<option value="">All Language</option>
<option>Hindi</option>
<option>English</option>
<option>Japanese</option>
<option>Tamil</option>
<option>Arabic</option>
</select>
</header>

<div id="ad-top">📢 Ad Here</div>

<div class="container" id="animeContainer"></div>

<div id="ad-mid">📢 Ad Here</div>

<div id="detailPage"></div>

<div id="ad-bottom">📢 Ad Here</div>

<script>

const animeList = [
{ name:"Naruto", cat:"Action", lang:"Japanese Hindi English", desc:"Ninja journey." },
{ name:"One Piece", cat:"Action", lang:"Japanese Hindi English", desc:"Pirate adventure." },
{ name:"Attack on Titan", cat:"Action", lang:"Japanese English Tamil", desc:"Dark survival." },
{ name:"Demon Slayer", cat:"Action", lang:"Japanese Hindi English Tamil", desc:"Demon battles." },
{ name:"Jujutsu Kaisen", cat:"Action", lang:"Japanese English", desc:"Cursed fights." },
{ name:"Tokyo Ghoul", cat:"Action", lang:"Japanese Hindi English", desc:"Ghoul world." },
{ name:"Chainsaw Man", cat:"Action", lang:"Japanese English", desc:"Devil hunter." },
{ name:"Bleach", cat:"Action", lang:"Japanese Hindi English", desc:"Soul reaper." },
{ name:"Black Clover", cat:"Action", lang:"Japanese Hindi", desc:"Magic knights." },
{ name:"My Hero Academia", cat:"Action", lang:"Japanese English", desc:"Hero school." },

{ name:"Dragon Ball Z", cat:"Action", lang:"Japanese Hindi English", desc:"Power battles." },
{ name:"Hunter x Hunter", cat:"Action", lang:"Japanese English", desc:"Hunter journey." },
{ name:"Vinland Saga", cat:"Action", lang:"Japanese English", desc:"Viking story." },
{ name:"Fire Force", cat:"Action", lang:"Japanese English", desc:"Fire fighters." },
{ name:"Blue Exorcist", cat:"Action", lang:"Japanese English", desc:"Exorcist battles." },

{ name:"Gintama", cat:"Comedy", lang:"Japanese English", desc:"Comedy parody." },
{ name:"Konosuba", cat:"Comedy", lang:"Japanese English", desc:"Funny fantasy." },
{ name:"Saiki Kusuo", cat:"Comedy", lang:"Japanese English", desc:"Psychic comedy." },
{ name:"Grand Blue", cat:"Comedy", lang:"Japanese English", desc:"College fun." },
{ name:"Prison School", cat:"Comedy", lang:"Japanese English", desc:"Comedy chaos." },

{ name:"Nichijou", cat:"Comedy", lang:"Japanese English", desc:"Daily funny life." },
{ name:"Asobi Asobase", cat:"Comedy", lang:"Japanese English", desc:"Crazy comedy." },
{ name:"Sakamoto Desu Ga", cat:"Comedy", lang:"Japanese", desc:"Cool comedy." },
{ name:"Devil is a Part Timer", cat:"Comedy", lang:"Japanese English", desc:"Comedy fantasy." },

{ name:"Your Name", cat:"Romance", lang:"Japanese Hindi English", desc:"Love story." },
{ name:"Weathering With You", cat:"Romance", lang:"Japanese English", desc:"Romantic drama." },
{ name:"Toradora", cat:"Romance", lang:"Japanese English", desc:"School love." },
{ name:"Horimiya", cat:"Romance", lang:"Japanese English", desc:"Cute romance." },
{ name:"Kimi ni Todoke", cat:"Romance", lang:"Japanese", desc:"Pure love." },

{ name:"Clannad", cat:"Romance", lang:"Japanese English", desc:"Emotional story." },
{ name:"Golden Time", cat:"Romance", lang:"Japanese", desc:"College romance." },
{ name:"Love is War", cat:"Romance", lang:"Japanese English", desc:"Mind game love." },

{ name:"Sword Art Online", cat:"Fantasy", lang:"Japanese Hindi English", desc:"Game world." },
{ name:"Re Zero", cat:"Fantasy", lang:"Japanese English", desc:"Time loop." },
{ name:"Overlord", cat:"Fantasy", lang:"Japanese English", desc:"Dark fantasy." },
{ name:"Fairy Tail", cat:"Fantasy", lang:"Japanese English", desc:"Magic guild." },
{ name:"No Game No Life", cat:"Fantasy", lang:"Japanese English", desc:"Gaming world." },

{ name:"Dr Stone", cat:"Sci-Fi", lang:"Japanese English", desc:"Science story." },
{ name:"Steins Gate", cat:"Sci-Fi", lang:"Japanese English", desc:"Time travel." },
{ name:"Parasyte", cat:"Sci-Fi", lang:"Japanese English", desc:"Alien invasion." },

{ name:"Mob Psycho 100", cat:"Action", lang:"Japanese English", desc:"Psychic power." },
{ name:"Akame ga Kill", cat:"Action", lang:"Japanese English", desc:"Assassin story." },
{ name:"Black Bullet", cat:"Action", lang:"Japanese English", desc:"Monster battles." },

{ name:"Magi", cat:"Fantasy", lang:"Japanese English", desc:"Adventure magic." },
{ name:"Slime Isekai", cat:"Fantasy", lang:"Japanese English", desc:"Reincarnation." },
{ name:"Tokyo Revengers", cat:"Action", lang:"Japanese English", desc:"Time gang story." }
];

function displayAnime(list){
let output="";
list.forEach(a=>{
output+=`
<div class="card">
<h3>${a.name}</h3>
<p>${a.cat}</p>
<p>${a.lang}</p>
<button onclick="showDetail('${a.name}')">View</button>
</div>`;
});
document.getElementById("animeContainer").innerHTML=output;
}

function filterAnime(){
let search=document.getElementById("search").value.toLowerCase();
let cat=document.getElementById("category").value;
let lang=document.getElementById("language").value;

let filtered=animeList.filter(a=>{
return a.name.toLowerCase().includes(search)
&& (!cat || a.cat==cat)
&& (!lang || a.lang.includes(lang));
});

displayAnime(filtered);
}

function showDetail(name){
let a=animeList.find(x=>x.name===name);

document.getElementById("detailPage").style.display="block";
document.getElementById("detailPage").innerHTML=`
<h2>${a.name}</h2>
<p>${a.desc}</p>
<p><b>Languages:</b> ${a.lang}</p>

<button onclick="window.location.href='https://www.amazon.in'">
Buy Anime Merch
</button>

<div style="margin-top:20px;background:#333;padding:10px;">
📢 Ad Here
</div>
`;

window.scrollTo(0,document.body.scrollHeight);
}

displayAnime(animeList);

</script>

</body>
</html>
