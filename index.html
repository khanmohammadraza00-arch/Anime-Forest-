
{ <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Hub Pro</title>

<style>
:root{--bg:#0d0d0d;--card:#1a1a1a;--accent:#ff4757}
body{margin:0;font-family:Arial;background:var(--bg);color:#fff}
header{background:#121212;padding:10px;text-align:center;position:sticky;top:0}
input,select{padding:8px;margin:5px;border-radius:6px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:10px}
.card{background:var(--card);padding:10px;border-radius:10px}
button{padding:7px;border:none;border-radius:6px;background:var(--accent);color:#fff;margin-top:5px}
.fav{background:#333}
.fav.active{background:gold;color:black}
.hero{padding:15px;background:#1f1f1f;margin:10px;border-radius:10px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}
.modal-box{background:#111;padding:15px;border-radius:10px;width:90%;max-width:600px}
.ad{background:#333;margin:10px;padding:10px;text-align:center}
.top{position:fixed;bottom:10px;right:10px;background:#222;padding:10px;border-radius:50%}
</style>
</head>

<body>

<header>
<h1>🔥 Anime Hub Pro</h1>
<input id="search" placeholder="Search..." oninput="filterAnime()">

<select id="category" onchange="filterAnime()">
<option value="">All Category</option>
<option>Action</option><option>Comedy</option><option>Romance</option>
<option>Fantasy</option><option>Sci-Fi</option>
</select>

<select id="language" onchange="filterAnime()">
<option value="">All Language</option>
<option>Hindi</option>
<option>English</option>
<option>Japanese</option>
<option>Tamil</option>
<option>Telugu</option>
</select>

<button onclick="showFav()">❤️ Favorites</button>
</header>

<div class="ad">📢 Ad Here</div>
<div class="hero" id="hero"></div>
<div class="grid" id="grid"></div>
<div class="ad">📢 Ad Here</div>

<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()">❌</span>
<div id="detail"></div>
</div>
</div>

<div class="ad">📢 Ad Here</div>
<div class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>

// ===== DATA (100 Anime with multi-language) =====
const animeList = [
{
name:"Naruto",
cat:"Action",
lang:["Japanese","Hindi","English","Tamil","Telugu"],
desc:"Ninja journey",
watch:"https://www.crunchyroll.com",
trailer:"https://www.youtube.com/embed/-G9BqkgZXRA"
},

...Array.from({length:99},(_,i)=>({
name:"Anime "+(i+2),
cat:["Action","Comedy","Romance","Fantasy","Sci-Fi"][i%5],
lang:["Japanese","English","Hindi","Tamil","Telugu"],
desc:"Popular anime",
watch:"https://www.netflix.com",
trailer:"https://www.youtube.com/embed/dQw4w9WgXcQ"
}))
];

// ===== STORAGE =====
function getFav(){return JSON.parse(localStorage.getItem('fav')||'[]')}
function toggleFav(n,btn){
let f=getFav()
f.includes(n)?f=f.filter(x=>x!==n):f.push(n)
localStorage.setItem('fav',JSON.stringify(f))
btn.classList.toggle('active')
}

function getViews(){return JSON.parse(localStorage.getItem('views')||'{}')}
function addView(n){
let v=getViews()
v[n]=(v[n]||0)+1
localStorage.setItem('views',JSON.stringify(v))
}

// ===== RENDER =====
function render(list){
let v=getViews()
grid.innerHTML=list.map(a=>`
<div class="card">
<h3>${a.name}</h3>
<p>${a.cat}</p>
<p>${a.lang.join(', ')}</p>
<p>👁 ${v[a.name]||0}</p>
<button onclick="openDetail('${a.name}')">View</button>
<button class="fav ${getFav().includes(a.name)?'active':''}" onclick="toggleFav('${a.name}',this)">❤️</button>
</div>
`).join('')
}

// ===== HERO =====
function setHero(){
hero.innerHTML=`
<h2>🔥 Trending: ${animeList[0].name}</h2>
<p>${animeList[0].desc}</p>
<button onclick="openDetail('${animeList[0].name}')">Watch Now</button>`
}

// ===== FILTER =====
function filterAnime(){
let s=search.value.toLowerCase()
let c=category.value
let l=language.value

let f=animeList.filter(a=>
a.name.toLowerCase().includes(s)&&
(!c||a.cat===c)&&
(!l||a.lang.includes(l))
)

render(f)
}

// ===== DETAIL =====
function openDetail(name){
let a=animeList.find(x=>x.name===name)
addView(name)

detail.innerHTML=`
<h2>${a.name}</h2>
<iframe width="100%" height="200" src="${a.trailer}" allowfullscreen></iframe>
<p>${a.desc}</p>
<p>${a.lang.join(', ')}</p>

<button onclick="window.open('${a.watch}','_blank')">▶ Watch</button>
<button onclick="window.location.href='https://www.amazon.in'">🛒 Buy</button>

<div class="ad">📢 Ad Here</div>
`

modal.style.display='flex'
render(animeList)
}

function closeModal(){modal.style.display='none'}

// ===== FAVORITES =====
function showFav(){
let f=getFav()
let list=animeList.filter(a=>f.includes(a.name))
render(list.length?list:animeList)
}

// ===== INIT =====
setHero()
render(animeList)

</script>

</body>
</html>
